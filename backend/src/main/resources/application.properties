# ============================================================
# Application Configuration - Facility Management System
# ============================================================
spring.application.name=facility-management

# Server
server.port=8080
server.servlet.context-path=/api

# ============================================================
# PostgreSQL Database
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/facility_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Console (for debugging)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:schema.sql
#spring.sql.init.data-locations=classpath:seed.sql

# ============================================================
# SQL Initialization
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:seed.sql

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!
app.jwt.expiration-ms=86400000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ============================================================
# Logging
# ============================================================
logging.level.com.facility=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Springdoc / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
